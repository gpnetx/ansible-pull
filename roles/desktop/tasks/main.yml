---
- name: Install desktop baseline packages
  ansible.builtin.apt:
    name: "{{ desktop_packages }}"
    state: present
    update_cache: true

- name: Add Flathub remote
  ansible.builtin.command: >
    flatpak remote-add --if-not-exists flathub
    https://flathub.org/repo/flathub.flatpakrepo
  register: flathub_result
  changed_when: flathub_result.rc == 0 and "already exists" not in flathub_result.stderr

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

# Firefox
- name: Download Mozilla repo signing key
  ansible.builtin.get_url:
    url: https://packages.mozilla.org/apt/repo-signing-key.gpg
    dest: /etc/apt/keyrings/packages.mozilla.org.asc
    mode: "0644"

- name: Add Mozilla repo for Firefox
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/mozilla.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://packages.mozilla.org/apt
      Suites: mozilla
      Components: main
      Signed-By: /etc/apt/keyrings/packages.mozilla.org.asc

- name: Pin Mozilla packages
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/mozilla
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: *
      Pin: origin packages.mozilla.org
      Pin-Priority: 1000

- name: Remove Firefox ESR
  ansible.builtin.apt:
    name: firefox-esr
    state: absent
    purge: true

- name: Install Firefox
  ansible.builtin.apt:
    name: firefox
    state: present
    update_cache: true

# Brave
- name: Download Brave archive keyring
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"

- name: Add Brave source file
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
    dest: /etc/apt/sources.list.d/brave-browser-release.sources
    mode: "0644"

- name: Install Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present
    update_cache: true

# Microsoft Edge
- name: Download Microsoft signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"

- name: Add Microsoft Edge repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/microsoft-edge.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.asc] https://packages.microsoft.com/repos/edge stable main

- name: Install Microsoft Edge
  ansible.builtin.apt:
    name: microsoft-edge-stable
    state: present
    update_cache: true

# Syncthing
- name: Enable and start Syncthing system service for gregg
  ansible.builtin.systemd:
    name: "syncthing@{{ gregg_user }}"
    enabled: true
    state: started

# WireGuard
- name: Install WireGuard packages
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: true

- name: Ensure /etc/wireguard exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check if WireGuard private key exists
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wg_privatekey

- name: Generate WireGuard private key
  ansible.builtin.shell: |
    umask 077
    wg genkey > /etc/wireguard/privatekey
  when: not wg_privatekey.stat.exists

- name: Generate WireGuard public key
  ansible.builtin.shell: |
    wg pubkey < /etc/wireguard/privatekey > /etc/wireguard/publickey
  when: not wg_privatekey.stat.exists

- name: Set permissions on WireGuard private key
  ansible.builtin.file:
    path: /etc/wireguard/privatekey
    owner: root
    group: root
    mode: "0600"

- name: Set permissions on WireGuard public key
  ansible.builtin.file:
    path: /etc/wireguard/publickey
    owner: root
    group: root
    mode: "0644"
